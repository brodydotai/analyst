<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Thesis Reader</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --panel: #171a23;
      --panel-2: #1f2430;
      --text: #e6e9ef;
      --muted: #9aa3b2;
      --accent: #6aa6ff;
      --accent-2: #8be9fd;
      --border: #2b3242;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(130deg, #0d1016 0%, #101420 45%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(23, 26, 35, 0.88);
      backdrop-filter: blur(8px);
      padding: 20px 16px;
      overflow-y: auto;
    }

    .brand {
      margin-bottom: 18px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(140deg, #1b2030, #171b28);
    }

    .brand h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .category {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--panel);
    }

    .category h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-2);
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }

    .report-list {
      list-style: none;
      margin: 0;
      padding: 8px;
    }

    .report-list li + li {
      margin-top: 6px;
    }

    .report-link {
      display: block;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 8px 10px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .report-link:hover {
      border-color: #34405a;
      background: #21293a;
    }

    .report-link.active {
      border-color: #476497;
      background: #26344d;
      color: #dbe8ff;
    }

    .main {
      padding: 30px min(4vw, 32px);
      overflow-y: auto;
    }

    .meta {
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 0.9rem;
    }

    .viewer {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(23, 26, 35, 0.85);
      padding: clamp(16px, 3vw, 28px);
      line-height: 1.65;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
    }

    .viewer h1,
    .viewer h2,
    .viewer h3 {
      line-height: 1.25;
      margin-top: 1.2em;
    }

    .viewer h1 {
      margin-top: 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .viewer code {
      background: #1d2433;
      border: 1px solid #313a4f;
      border-radius: 6px;
      padding: 2px 5px;
      font-size: 0.9em;
    }

    .viewer pre {
      background: #141b28;
      border: 1px solid #2c3547;
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
    }

    .viewer blockquote {
      margin-left: 0;
      padding-left: 12px;
      border-left: 3px solid #415376;
      color: #c8d2e8;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>Investment Thesis Reader</h1>
        <p>Equities, Commodities, Crypto</p>
      </div>
    </aside>

    <main class="main">
      <div class="meta" id="meta">Choose a report from the sidebar.</div>
      <article class="viewer" id="viewer">
        <p class="empty">No report selected.</p>
      </article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const reportsByCategory = {
      equities: [
        "artifacts/equities/reports/adbe.feb.md",
        "artifacts/equities/reports/aspi.feb.md",
        "artifacts/equities/reports/aspi.feb.original.md",
        "artifacts/equities/reports/aspi.feb.updated.md",
        "artifacts/equities/reports/clf.mar.md",
        "artifacts/equities/reports/crcl.feb.md",
        "artifacts/equities/reports/intc.feb.md",
        "artifacts/equities/reports/kmt.feb.md",
        "artifacts/equities/reports/mtrn.feb.md",
        "artifacts/equities/reports/neo.feb.md",
        "artifacts/equities/reports/nvda.feb.md",
        "artifacts/equities/reports/oklo.feb.md",
        "artifacts/equities/reports/s.feb.md",
        "artifacts/equities/reports/snap.feb.md",
        "artifacts/equities/reports/sols.feb.md",
        "artifacts/equities/reports/tic.feb.md",
        "artifacts/equities/reports/vnet.feb.md"
      ],
      commodities: [
        "artifacts/commodities/reports/copper.feb.md",
        "artifacts/commodities/reports/gold.feb.md",
        "artifacts/commodities/reports/platinum.feb.md",
        "artifacts/commodities/reports/silver.feb.md",
        "artifacts/commodities/reports/uranium.feb.md"
      ],
      crypto: [
        "artifacts/crypto/reports/crypto-intelligence-api.diagnostics.feb.md",
        "artifacts/crypto/reports/droyd-experiment-implementation.feb.md",
        "artifacts/crypto/reports/hype.feb.md",
        "artifacts/crypto/reports/syrup.feb.md"
      ]
    };

    const sidebarEl = document.getElementById("sidebar");
    const viewerEl = document.getElementById("viewer");
    const metaEl = document.getElementById("meta");

    function prettyName(path) {
      const file = path.split("/").pop().replace(".md", "");
      const monthMap = {
        jan: "(Jan)",
        feb: "(Feb)",
        mar: "(Mar)",
        apr: "(Apr)",
        may: "(May)",
        jun: "(Jun)",
        jul: "(Jul)",
        aug: "(Aug)",
        sep: "(Sep)",
        oct: "(Oct)",
        nov: "(Nov)",
        dec: "(Dec)"
      };
      return file
        .split(".")
        .map((part) => monthMap[part.toLowerCase()] || part.toUpperCase())
        .join(" ");
    }

    async function loadReport(path, button) {
      document.querySelectorAll(".report-link").forEach((el) => el.classList.remove("active"));
      if (button) {
        button.classList.add("active");
      }

      metaEl.textContent = path;
      viewerEl.innerHTML = "<p class='empty'>Loading report...</p>";

      try {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const markdown = await response.text();
        viewerEl.innerHTML = marked.parse(markdown);
      } catch (error) {
        viewerEl.innerHTML =
          "<p class='empty'>Could not load report. If opened directly as a local file, run a local server (for example: <code>python3 -m http.server 8000</code>) and open this page via <code>http://localhost:8000/thesis-reader.html</code>.</p>";
      }
    }

    function buildSidebar() {
      Object.entries(reportsByCategory).forEach(([category, reports]) => {
        const section = document.createElement("section");
        section.className = "category";

        const title = document.createElement("h2");
        title.textContent = category;
        section.appendChild(title);

        const list = document.createElement("ul");
        list.className = "report-list";

        reports.forEach((reportPath) => {
          const item = document.createElement("li");
          const button = document.createElement("button");
          button.className = "report-link";
          button.textContent = prettyName(reportPath);
          button.addEventListener("click", () => loadReport(reportPath, button));
          item.appendChild(button);
          list.appendChild(item);
        });

        section.appendChild(list);
        sidebarEl.appendChild(section);
      });
    }

    buildSidebar();
  </script>
</body>
</html>
