# Data Sources Configuration
# Primary data providers for the research pipeline.
# Architecture: MCP-first for structured data, REST fallback for testing.

sources:
  # ── PRIMARY: Findatasets (MCP Server) ──────────────────────────────────
  # All company-specific financial data routes through here.
  # MCP server used in both Cowork (dev) and production (app server).
  - name: Financial Datasets
    type: mcp_server
    priority: 1
    mcp_endpoints:
      programmatic: https://mcp.financialdatasets.ai/api    # API key auth (production)
      streamable_http: https://mcp.financialdatasets.ai/mcp  # OAuth (interactive)
      sse: https://mcp.financialdatasets.ai/sse              # SSE transport
    auth:
      header: X-API-KEY
      env_var: FINDATASETS_API_KEY
    tools:
      - getIncomeStatement       # Revenue, net income, EPS, margins, R&D
      - getBalanceSheet          # Assets, liabilities, equity, debt, cash
      - getCashFlowStatement     # Operating CF, FCF, capex, buybacks
      - getFinancialMetrics      # 40+ ratios: valuation, profitability, growth, liquidity, efficiency
      - getFilings               # SEC filing list (10-K, 10-Q, 8-K, DEF 14A)
      - getFilingItems           # Extract specific items from 10-K/10-Q (risk factors, business desc)
      - getAvailableFilingItems  # List extractable items per filing type
      - getCompanyFacts          # Name, CIK, market cap, employees, sector, industry, website
      - getNews                  # Recent news articles for a ticker
      - getCryptoPriceSnapshot   # Real-time crypto price
      - getCryptoPrices          # Historical crypto price data
      - getAvailableCryptoTickers
    use_cases:
      - Financial statements (income, balance sheet, cash flow)
      - Valuation and profitability metrics (P/E, EV/EBITDA, ROE, ROIC, etc.)
      - SEC filings retrieval and item extraction
      - Analyst estimates (EPS, revenue — internal models, <1% deviation from consensus)
      - Earnings snapshots (8-K) with beat/miss signals
      - Company facts (employees, CIK, sector classification)
      - Insider trades (Form 4)
      - Earnings press releases
      - News articles
      - Crypto pricing
    rest_api:
      base_url: https://api.financialdatasets.ai
      docs: https://docs.financialdatasets.ai
      note: "REST endpoints mirror MCP tools. Used by scripts/data-layer/ test harness."
    status: active

  # ── SECONDARY: FRED (REST API) ────────────────────────────────────────
  # Macro data — no MCP server available. REST only.
  - name: FRED (Federal Reserve Economic Data)
    type: rest_api
    priority: 1
    base_url: https://api.stlouisfed.org/fred
    auth:
      env_var: FRED_API_KEY
    key_series:
      - DFF            # Fed funds effective rate
      - DGS10          # 10-year Treasury yield
      - DGS2           # 2-year Treasury yield
      - T10Y2Y         # 10Y-2Y spread (yield curve)
      - CPIAUCSL       # CPI all urban consumers
      - UNRATE         # Unemployment rate
      - GDP            # Gross domestic product
      - M2SL           # M2 money stock
      - DTWEXBGS       # Trade-weighted dollar index
      - DCOILWTICO     # WTI crude oil
      - GOLDAMGBD228NLBM  # Gold fixing price London
    use_cases:
      - Fed funds rate, Treasury yields, yield curve
      - CPI, PCE, PPI inflation metrics
      - GDP, unemployment, industrial production
      - M2 money supply, bank lending
      - DXY (dollar index proxy via trade-weighted)
      - Commodity price indexes (WTI, gold)
    docs: https://fred.stlouisfed.org/docs/api/fred/
    status: active
    note: "No MCP available. Pipeline uses WebSearch fallback when REST is blocked."

  # ── TERTIARY: Yahoo Finance ────────────────────────────────────────────
  # Lightweight fallback for real-time price data only.
  # Most Yahoo data is now covered by Findatasets at higher quality.
  - name: Yahoo Finance
    type: library
    priority: 3
    packages:
      node: yahoo-finance2
      python: yfinance
    unique_data:
      - Real-time / intraday price (not in Findatasets)
      - Analyst price targets (Findatasets has EPS/revenue estimates but not price targets)
      - 52-week high/low with intraday precision
      - Beta, average volume
      - ETF holdings and sector weights
    status: active
    note: "Demoted to price-only provider. Fundamentals now sourced from Findatasets SEC filings."

# ── Provider Hierarchy ────────────────────────────────────────────────────
# For any given data point, prefer in this order:
#   1. Findatasets (SEC-sourced, audited)
#   2. FRED (government data)
#   3. Yahoo (market data, unaudited)
#   4. WebSearch (last resort)

provider_hierarchy:
  fundamentals: findatasets    # Income, balance sheet, cash flow
  valuation: findatasets       # P/E, EV/EBITDA, etc.
  estimates: findatasets       # Analyst EPS/revenue estimates
  earnings: findatasets        # 8-K snapshots, beat/miss
  filings: findatasets         # SEC documents
  insider: findatasets         # Form 4
  company_info: findatasets    # Company facts
  news: findatasets            # Recent articles
  macro: fred                  # Rates, inflation, yields
  commodities: fred            # WTI, gold
  realtime_price: yahoo        # Current price, 52w range
  price_targets: yahoo         # Analyst price targets
  etf_data: yahoo              # ETF holdings
  crypto: findatasets          # Crypto pricing

# ── Test Harness ──────────────────────────────────────────────────────────
# scripts/data-layer/ contains a standalone Node.js test harness that
# validates data coverage via REST APIs. Use this to verify Findatasets
# has data for a given ticker before running the full pipeline.
#
#   cd scripts/data-layer && npm install
#   node gather.js NVDA --json
#   node test-harness.js --quick
