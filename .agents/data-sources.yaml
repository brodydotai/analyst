# Data Sources Configuration
# These APIs provide structured data to supplement web research.
# Currently blocked in Cowork VM sandbox; functional when running locally.

sources:
  - name: FRED (Federal Reserve Economic Data)
    type: rest_api
    base_url: https://api.stlouisfed.org/fred
    api_key: f6b32261ad4f7b7d3cc887cfbb982481
    use_cases:
      - Fed funds rate, Treasury yields, yield curve
      - CPI, PCE, PPI inflation metrics
      - GDP, unemployment, industrial production
      - M2 money supply, bank lending
      - DXY (dollar index proxy via trade-weighted)
      - Commodity price indexes
    key_series:
      - DFF      # Fed funds effective rate
      - DGS10    # 10-year Treasury yield
      - DGS2     # 2-year Treasury yield
      - T10Y2Y   # 10Y-2Y spread (yield curve)
      - CPIAUCSL # CPI all urban consumers
      - UNRATE   # Unemployment rate
      - GDP      # Gross domestic product
      - M2SL     # M2 money stock
      - DTWEXBGS # Trade-weighted dollar index
      - DCOILWTICO # WTI crude oil
      - GOLDAMGBD228NLBM # Gold fixing price London
    docs: https://fred.stlouisfed.org/docs/api/fred/

  - name: Findatasets (SEC Filings)
    type: api
    identifier: ddd093b6-5bbc-40d2-b34e-73186eb639b9
    use_cases:
      - 10-K, 10-Q annual/quarterly filings
      - 13F institutional ownership
      - 8-K material events
      - Insider transactions (Form 4)
      - Proxy statements (DEF 14A)

  - name: Yahoo Finance (yfinance)
    type: python_library
    install: pip install yfinance
    use_cases:
      - Real-time and historical pricing
      - Market cap, P/E, EPS, revenue, margins
      - 52-week range, beta, average volume
      - Dividend yield and history
      - Analyst recommendations and price targets
      - ETF holdings and sector weights
      - Earnings calendar and estimates
    example: |
      import yfinance as yf
      t = yf.Ticker("UUUU")
      info = t.info  # dict with all fundamentals
      hist = t.history(period="1y")  # price history
      # ETF-specific:
      holdings = t.get_funds_data().top_holdings  # top holdings

status: blocked_in_vm  # All three blocked by Cowork network sandbox
fallback: WebSearch tool provides equivalent data via web scraping
